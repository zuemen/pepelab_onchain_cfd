name: Oracle Price Keeper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Update oracle with real market prices
        env:
          ORACLE: "0x17CA20A37Cf04F2f589B2573EC95f1411D29d958"
          RPC_URL: ${{ secrets.KEEPER_RPC_URL }}
          PK: ${{ secrets.KEEPER_PRIVATE_KEY }}
        run: |
          set -uo pipefail
          to8() { awk -v p="$1" 'BEGIN{ printf "%.0f", p*1e8 }'; }
          get_crypto() {
            curl -s "https://api.coingecko.com/api/v3/simple/price?ids=$1&vs_currencies=usd" \
              | jq -r --arg id "$1" '.[$id].usd // empty'
          }
          get_stooq() {
            curl -s "https://stooq.com/q/l/?s=$1&f=sd2t2ohlcv&h&e=csv" \
              | tail -n1 | cut -d, -f7 | tr -d '\r'
          }
          update() {
            local SYM=$1 USD=$2
            if [ -z "$USD" ] || [ "$USD" = "N/D" ] || [ "$USD" = "0" ]; then
              echo "$SYM: еПЦдЄНеИ∞зЬЯеѓ¶еГєж†Љ,иЈ≥йБО"; return
            fi
            local KEY REAL OLD NEW UP DN
            KEY=$(cast keccak "$SYM")
            REAL=$(to8 "$USD")
            OLD=$(cast call "$ORACLE" "getPrice(bytes32)(uint256,uint256)" "$KEY" \
                  --rpc-url "$RPC_URL" | head -n1 | awk '{print $1}')
            if [ -z "$OLD" ] || [ "$OLD" = "0" ]; then
              NEW=$REAL
            else
              UP=$(( OLD * 145 / 100 ))
              DN=$(( OLD * 55 / 100 ))
              NEW=$REAL
              [ "$NEW" -gt "$UP" ] && NEW=$UP
              [ "$NEW" -lt "$DN" ] && NEW=$DN
            fi
            echo "$SYM: real=\$$USD  oracle $OLD -> $NEW"
            cast send "$ORACLE" "updatePrice(bytes32,uint256)" "$KEY" "$NEW" \
              --rpc-url "$RPC_URL" --private-key "$PK" \
              || echo "$SYM: updatePrice е§±жХЧ(еГєж†ЉйШ≤и≠Ј?),зХ•йБО"
          }
          update sBTC  "$(get_crypto bitcoin)"
          update sETH  "$(get_crypto ethereum)"
          update sAAPL "$(get_stooq aapl.us)"
          update sTSLA "$(get_stooq tsla.us)"
          update sGOLD "$(get_stooq xauusd)"
          update sBOND "$(get_stooq tlt.us)"
          echo "Done."
