name: Base Sepolia Keeper

# Phase 4 keeper for the live Base Sepolia deployment (chainId 84532):
#   1. refresh MockOracle prices from real market data (with the contract's
#      own ±45% move guard as backstop),
#   2. crank settleFunding so funding accrues even with no organic traders,
#   3. log InsuranceVault solvency for monitoring.
# Secrets: BASE_SEPOLIA_RPC_URL, KEEPER_PRIVATE_KEY (funded Base Sepolia EOA).

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min (FUNDING_INTERVAL is 5 min)
  workflow_dispatch:

jobs:
  keep:
    runs-on: ubuntu-latest
    env:
      ORACLE:   "0xeD90c4F3B48213888870C1FC8486921Cb0990Aa3"
      EXCHANGE: "0xEf75ECA6514cE96B18382E921aC6190a0cF8c072"
      VAULT:    "0xB364E2e3e1e7a2b033eF03a4ACceF42066F3D812"
      RPC_URL:  ${{ secrets.BASE_SEPOLIA_RPC_URL }}
      PK:       ${{ secrets.KEEPER_PRIVATE_KEY }}
    steps:
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Refresh prices
        run: |
          set -uo pipefail
          to8() { awk -v p="$1" 'BEGIN{ printf "%.0f", p*1e8 }'; }
          get_crypto() {
            curl -s "https://api.coingecko.com/api/v3/simple/price?ids=$1&vs_currencies=usd" \
              | jq -r --arg id "$1" '.[$id].usd // empty'
          }
          get_stooq() {
            curl -s "https://stooq.com/q/l/?s=$1&f=sd2t2ohlcv&h&e=csv" \
              | tail -n1 | cut -d, -f7 | tr -d '\r'
          }
          update() {
            local SYM=$1 USD=$2
            if [ -z "$USD" ] || [ "$USD" = "N/D" ] || [ "$USD" = "0" ]; then
              echo "$SYM: no real price, skip"; return
            fi
            local KEY REAL; KEY=$(cast keccak "$SYM"); REAL=$(to8 "$USD")
            echo "$SYM: real=\$$USD -> $REAL"
            cast send "$ORACLE" "updatePrice(bytes32,uint256)" "$KEY" "$REAL" \
              --rpc-url "$RPC_URL" --private-key "$PK" \
              || echo "$SYM: updatePrice failed (price guard?), skip"
          }
          update sBTC  "$(get_crypto bitcoin)"
          update sETH  "$(get_crypto ethereum)"
          update sAAPL "$(get_stooq aapl.us)"
          update sTSLA "$(get_stooq tsla.us)"

      - name: Crank settleFunding
        run: |
          set -uo pipefail
          for SYM in sBTC sETH sAAPL sTSLA; do
            KEY=$(cast keccak "$SYM")
            # settleFunding reverts FundingIntervalNotElapsed if too soon — that's fine.
            cast send "$EXCHANGE" "settleFunding(bytes32)" "$KEY" \
              --rpc-url "$RPC_URL" --private-key "$PK" \
              && echo "$SYM: funding settled" \
              || echo "$SYM: funding interval not elapsed, skip"
          done

      - name: Log vault solvency
        run: |
          set -uo pipefail
          ASSETS=$(cast call "$VAULT" "totalAssets()(uint256)" --rpc-url "$RPC_URL" | awk '{print $1}')
          SUPPLY=$(cast call "$VAULT" "totalSupply()(uint256)" --rpc-url "$RPC_URL" | awk '{print $1}')
          echo "InsuranceVault: totalAssets=$ASSETS  pIV supply=$SUPPLY"
          echo "Done."
